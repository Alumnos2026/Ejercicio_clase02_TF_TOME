<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Iconos</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>

        .col-4{
            background-color: rgb(194, 230, 230);
            border-radius: 20px;
            box-shadow: 0px 10px 15px;
            margin-bottom: 10px;
            border: 3px solid rgb(0, 109, 83);
            text-align: center;
            margin-right: 20px;
        }

        .row {
            flex-wrap: nowrap;
            display: flex;
            justify-content: center;
        }

    </style>

</head>

<body>
    <center>
    <div class="container"> 

        <div class="row">
            <div class="col-4 col">
                FACEBOOK <br>
                <i class="bi bi-facebook" style="font-size: 50px; color: blue;"></i><br>
                Seguinos en Facebook
            </div>
            <div class="col-4 col">
                TIK TOK <br>
                <i class="bi bi-tiktok" style="font-size: 50px; color: black;"></i><br>
                Seguinos en Tik Tok
            </div>
            <div class="col-4 col">
                WHATSAPP <br>
                <i class="bi bi-whatsapp" style="font-size: 50px; color: green;"></i><br>
                Seguinos en WhatsApp
            </div>
        </div>


        <div class="row">

            <div class="col-4 col">
                <a href="https://www.youtube.com/" target="_blank" style="text-decoration: none; color: inherit;">
                    YOUTUBE <br>
                    <i class="bi bi-youtube" style="font-size: 50px; color: red;"></i><br>
                    Seguinos en YouTube
                </a>
            </div>
             <div class="col-4 col">
                INSTAGRAM <br>
                <button type="button" class="btn btn-light" style="border-radius: 25px; margin-top: 10px;">
                    <i class="bi bi-instagram" style="font-size: 50px; color: purple;"></i>
                </button>
                <br>
                Seguinos en Instagram
            </div>
            <div class="col-4 col">
                <a href="https://twitter.com/" target="_blank" style="text-decoration: none; color: inherit;">
                    X <br>
                    <i class="bi bi-twitter-x" style="font-size: 50px; color: black;"></i><br>
                    Seguinos en X
                </a>
            </div>
        </div>

        
            <div>
                <i class="bi bi-alarm fs-1" style="color: #ff9800;"></i>
                <span class="ms-2">Alarma (fs-1)</span>
            </div>
            <div>
                <i class="bi bi-battery-full fs-3" style="color: #4caf50;"></i>
                <span class="ms-2">Batería llena (fs-3)</span>
            </div>
            <div>
                <i class="bi bi-cloud-sun fs-5" style="color: #2196f3;"></i>
                <span class="ms-2">Nube y sol (fs-5)</span>
            </div>
        

    </div>

    </center>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>    
</body>
</html>
