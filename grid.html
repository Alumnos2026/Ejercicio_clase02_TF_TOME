<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Grid</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <style>

        .col-1{
            background-color: aqua;
            border-radius: 10px;
            box-shadow: 0px 10px 15px;
            margin-bottom: 10px;
            border: 1px solid red;
            text-align: center;
        }

        .col-6{
            background-color: rgb(112, 112, 232);
            border-radius: 10px;
            box-shadow: 0px 10px 15px;
            margin-bottom: 10px;
            border: 1px solid greenyellow;
            text-align: center;
        }

        .col-4{
            background-color: yellow;
            border-radius: 10px;
            box-shadow: 0px 10px 15px;
            margin-bottom: 10px;
            border: 1px solid green;
            text-align: center;
        }

        .col-3{
            background-color: rgb(102, 216, 194);
            border-radius: 10px;
            box-shadow: 0px 10px 15px;
            margin-bottom: 10px;
            border: 1px solid green;
            text-align: center;
        }



    </style>

</head>

<body>
    <center>
<!-- contenedor -->
    <div class="container"> 
        <!-- fila -->
        <div class="row">
            <!-- grid -->
            <div class="col-1 col">Columna 1</div>
            <div class="col-1 col">Columna 2</div>
            <div class="col-1 col">Columna 3</div>
            <div class="col-1 col">Columna 4</div>
            <div class="col-1 col">Columna 5</div>
            <div class="col-1 col">Columna 6</div>
            <div class="col-1 col">Columna 7</div>
            <div class="col-1 col">Columna 8</div>
            <div class="col-1 col">Columna 9</div>
            <div class="col-1 col">Columna 10</div>
            <div class="col-1 col">Columna 11</div>
            <div class="col-1 col">Columna 12</div>
            <!-- <div class="col-1 col">Columna 13</div> -->
        </div>

        <div class="row">
            <div class="col-6 col">Columna 1</div>
            <div class="col-6 col">Columna 2</div>
            <!-- <div class="col-6 col">Columna 3</div> -->
        </div>

        <div class="row">
            <div class="col-4 col">Columna 1</div>
            <div class="col-4 col">Columna 2</div>
            <div class="col-4 col">Columna 3</div>
            <!-- <div class="col-4 col">Columna 4</div> -->
        </div>

        <div class="row">
            <div class="col-3 col">Columna 1</div>
            <div class="col-3 col">Columna 2</div>
            <div class="col-6 col">Columna 3</div>
            <!-- <div class="col-4 col">Columna 4</div> -->
        </div>
    </div>

    </center>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>    
</body>
</html>
